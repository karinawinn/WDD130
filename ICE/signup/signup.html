<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #cardContainer {
            background: white;
            border: 7px solid #0D2E7C;
            border-radius: 40px;
            width: 50%;
            margin-top: 15px;
            margin: auto;
            overflow: hidden;
            position: relative;
        }

        #heroContainer {
            display: grid;
        }

        #christ_img  {
            grid-area: 1 / 1;
            width: 100%;
            z-index: 1;
        }

        #heroText {
            grid-area: 1 / 1;
            display: flex;
            flex-direction: column;
            margin: auto;
            margin-bottom: 40px;
            z-index: 2;
            color: white;
            text-shadow: 2px 2px 5px black;
        }

        h1 {
            font-size: 4.0em;
        }

        h2 {
            font-size: 3.0em;
            font-weight: 200;
        }
        
        #formContainer {
            display: flex;
            flex-direction: column;
            margin-top: 10px;
        }

        h3 {
            margin: 20px auto;
            font-size: 1.8em;
        }

        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px;
            font-size: 1.4em;
        }

        #closeBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 30px;
            background: #EEEEEE;
            border: 1px solid gray;
            border-radius: 3px;
            cursor: pointer;
            z-index: 2;
            font-size: 20px;
        }

        #myForm section {
            grid-column: 1/3;
            justify-self: center;
        }

        input[type="radio"], input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        button[type="submit"] {
            background: #EEEEEE;
            padding: 5px;
            font-size: 20px;
            border: 1px solid gray;
            border-radius: 7px;
            cursor: pointer;
        }

        #scriptureContainer {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        #scriptureContainer img {
            width: 100%;
        }
    </style>

</head>

<body>
    <div id="cardContainer">
        <div id="heroContainer">
            <img id="christ_img" src="images/jesus_feeds_5000_cropped.jpeg" alt="Jesus_Feeds_5000">
            <div id="heroText">
                <h1>Daily Feed</h1>
                <h2>Scripture a Day</h2>
            </div>
        </div>
        <div id="formContainer">
            <h3>Sign Up for Daily Scripture Feed</h3>
            <form id="myForm">
                <button type="button" id="closeBtn">X</button>
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>

                <section>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section>
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section>
                    <button type="submit">Submit</button>
                </section>
            </form>
        </div>
        <div id="scriptureContainer">
            <img src="images/old_testament.webp" alt="old_testament">
            <img src="images/new_testament.webp" alt="new_testament">
            <img src="images/book_of_mormon.webp" alt="book_of_mormon">
            <img src="images/doctrine_and_covenants.webp" alt="doctrine_and_covenants">
            <img src="images/pearl_of_great_price.webp" alt="pearl_of_great_price">
        </div>
        <div id="output"></div>
    </div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
